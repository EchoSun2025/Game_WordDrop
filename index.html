<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WordDrop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro-panel">
        <h1>WordDrop</h1>
      </section>

      <section class="phone-frame">
        <header class="topbar" aria-hidden="true">
          <div class="stat-chip">
            <span class="stat-label">Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Energy</span>
            <strong id="energyValue">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Played</span>
            <strong id="learnedValue">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Hit Rate</span>
            <strong id="accuracyValue">0%</strong>
          </div>
        </header>

        <section class="mode-panel" aria-label="玩法模式">
          <button class="mode-button is-active" data-mode="image" type="button">1 图像匹配</button>
          <button class="mode-button" data-mode="sentence" type="button">2 句子匹配</button>
          <button class="mode-button" data-mode="builder" type="button">3 限时造句</button>
        </section>

        <section class="data-panel">
          <div class="data-copy" aria-hidden="true">
            <p class="tiny-label">DATA PACK</p>
            <strong id="packName">Starter Pack</strong>
            <p id="packMeta">6 words loaded.</p>
          </div>

          <div class="data-actions">
            <label class="secondary-button" for="importFile">导入 JSON</label>
            <input id="importFile" type="file" accept=".json,application/json" hidden />
            <a class="ghost-button link-button" href="./speech-test.html">语音测试</a>
            <button id="resetPackButton" class="ghost-button" type="button">恢复内置</button>
          </div>
        </section>

        <section class="playfield">
          <div class="playfield-header">
            <div>
              <p class="tiny-label">ROUND</p>
              <strong id="roundValue">0 / 0</strong>
            </div>
            <div class="mode-block">
              <p class="tiny-label">MODE</p>
              <strong id="modeValue">图像匹配</strong>
            </div>
            <div class="level-block">
              <p class="tiny-label">LEVEL</p>
              <strong id="levelValue">LV1</strong>
            </div>
            <button id="pauseButton" class="pause-button" type="button" disabled>Pause</button>
          </div>

          <div class="fall-lane">
            <div class="fall-track"></div>
            <div id="fallingWord" class="falling-word">READY</div>
            <div class="danger-line"></div>
          </div>

          <div class="timer-block">
            <div class="timer-rail">
              <div id="timerFill" class="timer-fill"></div>
            </div>
            <span id="timerText">0.0s</span>
          </div>
        </section>

        <section id="challengePanel" class="challenge-panel"></section>

        <section class="feedback-panel">
          <div class="feedback-copy">
            <h2 id="feedbackTitle">准备开始</h2>
            <p id="feedbackText">选择模式后点击开始。</p>
            <p id="feedbackTranscript" class="feedback-transcript">Voice: off</p>
            <div class="feedback-meta">
              <span id="feedbackWord">Word: --</span>
              <span id="feedbackPos">POS: --</span>
            </div>
          </div>
          <div class="feedback-preview">
            <img id="feedbackImage" src="./assets/apple.jpg" alt="当前反馈图片" />
          </div>
        </section>

        <footer class="controls">
          <button id="startButton" class="primary-button" type="button">开始 / 重新开始</button>
          <button id="retryWrongButton" class="ghost-button retry-button" type="button" disabled>错词再来</button>
          <p class="hint-text" id="hintText"></p>
        </footer>
      </section>
    </main>

    <script src="./realtime-transcriber.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
